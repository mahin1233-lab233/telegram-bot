name: Telegram Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '*/25 * * * *'
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: timeout 1400 python main.py || true
